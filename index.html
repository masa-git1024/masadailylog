<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L : Log</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23c4704a'/><text x='18' y='78' font-size='72' font-family='Georgia,serif' font-weight='bold' fill='white'>L</text></svg>">
<meta name="apple-mobile-web-app-title" content="L : Log">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2;
    --warm-white: #fffef9;
    --paper: #f5f0e8;
    --paper-dark: #ede7da;
    --ink: #2c2416;
    --ink-light: #6b5e4a;
    --ink-muted: #a89880;
    --terracotta: #c4704a;
    --terracotta-light: #e8c4af;
    --terracotta-pale: #f7ece4;
    --sage: #7a9e7e;
    --sage-light: #c2d9c4;
    --sage-pale: #edf4ee;
    --border: #e4ddd2;
    --shadow: rgba(44, 36, 22, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.6;
  }

  header {
    background: var(--warm-white);
    border-bottom: 2px solid var(--paper-dark);
    padding: 20px 24px;
  }

  .header-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--terracotta);
    letter-spacing: 0.04em;
  }

  .header-date {
    font-size: 12px;
    color: var(--ink-muted);
    margin-top: 3px;
    letter-spacing: 0.06em;
  }

  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  .section {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 22px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .section-label {
    font-family: 'Shippori Mincho', serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  /* 飲酒 */
  .alc-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .alc-btn {
    padding: 10px 4px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--cream);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.4;
  }

  .alc-btn:hover { border-color: #d4b896; color: var(--ink-light); }
  .alc-btn.sel-0 { border-color: var(--sage); background: var(--sage-pale); color: var(--sage); }
  .alc-btn.sel-1 { border-color: #c8b560; background: #fdf8e8; color: #8a7830; }
  .alc-btn.sel-2 { border-color: #d4914a; background: #fdf2e4; color: #8a5a20; }
  .alc-btn.sel-3 { border-color: var(--terracotta); background: var(--terracotta-pale); color: var(--terracotta); }
  .alc-btn.sel-4 { border-color: #b04040; background: #fde8e8; color: #8a2020; }

  .alc-type-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }

  .type-btn {
    padding: 10px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--cream);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }

  .type-btn.selected {
    border-color: var(--terracotta);
    background: var(--terracotta-pale);
    color: var(--terracotta);
  }

  /* チェック */
  .check-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--cream);
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 8px;
    user-select: none;
  }

  .check-row:last-child { margin-bottom: 0; }
  .check-row:hover { border-color: #d4b896; }
  .check-row.checked { border-color: var(--sage); background: var(--sage-pale); }

  .check-box {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    border: 2px solid var(--border);
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 12px;
    color: white;
    transition: all 0.15s;
  }

  .check-row.checked .check-box { background: var(--sage); border-color: var(--sage); }
  .check-label { font-size: 14px; font-weight: 500; color: var(--ink-light); }
  .check-row.checked .check-label { color: var(--sage); }

  /* 活動 */
  .field-label {
    font-size: 12px;
    color: var(--ink-muted);
    font-weight: 500;
    margin-bottom: 6px;
    display: block;
  }

  input[type="number"],
  input[type="text"],
  textarea {
    width: 100%;
    max-width: 100%;
    min-width: 0;
    box-sizing: border-box;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus, textarea:focus {
    border-color: var(--terracotta);
    box-shadow: 0 0 0 3px var(--terracotta-pale);
  }

  textarea { resize: vertical; line-height: 1.7; }

  .grid-row {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 8px;
    align-items: end;
  }

  /* まとめボタン */
  .btn-primary {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    background: var(--terracotta);
    color: white;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s;
    box-shadow: 0 3px 12px rgba(196,112,74,0.3);
    margin-bottom: 12px;
  }

  .btn-primary:hover { background: #b5623d; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  /* サマリー */
  .summary-box {
    background: var(--warm-white);
    border: 1.5px solid var(--terracotta-light);
    border-radius: 16px;
    padding: 20px 22px;
    box-shadow: 0 2px 8px var(--shadow);
    animation: fadeUp 0.3s ease;
  }

  .summary-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .summary-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--terracotta);
  }

  .copy-btn {
    padding: 6px 16px;
    border-radius: 6px;
    border: 1.5px solid var(--terracotta-light);
    background: var(--terracotta-pale);
    color: var(--terracotta);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .copy-btn:hover { background: var(--terracotta-light); }
  .copy-btn.copied { background: var(--sage-pale); border-color: var(--sage-light); color: var(--sage); }

  .summary-text {
    font-size: 14px;
    line-height: 2.2;
    color: var(--ink-light);
  }

  .summary-row {
    display: flex;
    gap: 10px;
    padding: 4px 0;
    border-bottom: 1px solid var(--paper);
  }

  .summary-row:last-child { border-bottom: none; }

  .summary-key {
    font-size: 12px;
    color: var(--ink-muted);
    width: 90px;
    flex-shrink: 0;
    padding-top: 1px;
  }

  .summary-val {
    font-size: 14px;
    color: var(--ink-light);
    font-weight: 500;
  }

  .streak-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .streak-row:last-child { border-bottom: none; }

  .streak-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-light);
    width: 90px;
    flex-shrink: 0;
  }

  .streak-row input {
    width: 80px;
    text-align: center;
    padding: 8px 10px;
    font-size: 16px;
    font-weight: 700;
    color: var(--terracotta);
  }

  .streak-unit {
    font-size: 13px;
    color: var(--ink-muted);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .alc-grid { gap: 4px; }
    .alc-btn { font-size: 11px; padding: 9px 2px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">L : Log</div>
  <div class="header-date" id="headerDate"></div>
</header>

<main>

  <!-- 飲酒 -->
  <div class="section">
    <div class="section-label">飲酒</div>
    <div class="alc-grid">
      <button class="alc-btn" data-level="0" onclick="selectAlc(0)">なし<br><span style="font-size:10px;opacity:.7">0杯</span></button>
      <button class="alc-btn" data-level="1" onclick="selectAlc(1)">少し<br><span style="font-size:10px;opacity:.7">1〜2杯</span></button>
      <button class="alc-btn" data-level="2" onclick="selectAlc(2)">普通<br><span style="font-size:10px;opacity:.7">3〜4杯</span></button>
      <button class="alc-btn" data-level="3" onclick="selectAlc(3)">多め<br><span style="font-size:10px;opacity:.7">5〜6杯</span></button>
      <button class="alc-btn" data-level="4" onclick="selectAlc(4)">たくさん<br><span style="font-size:10px;opacity:.7">それ以上</span></button>
    </div>
    <div class="alc-type-row" id="alcTypeRow" style="display:none;">
      <button class="type-btn" id="type-solo" onclick="selectType('一人飲み')">一人飲み</button>
      <button class="type-btn" id="type-party" onclick="selectType('飲み会')">飲み会</button>
    </div>
  </div>

  <!-- 継続記録 -->
  <div class="section">
    <div class="section-label">継続記録</div>
    <div class="streak-row">
      <span class="streak-label">減酒</span>
      <input type="number" id="f-streak-alc" placeholder="日数" min="0">
      <span class="streak-unit">日目</span>
    </div>
    <div class="streak-row">
      <span class="streak-label">控ラーメン</span>
      <input type="number" id="f-streak-ramen" placeholder="日数" min="0">
      <span class="streak-unit">日目</span>
    </div>
    <div class="streak-row">
      <span class="streak-label">セルフケア</span>
      <input type="number" id="f-streak-selfcare" placeholder="日数" min="0">
      <span class="streak-unit">日目</span>
    </div>
  </div>

  <!-- 活動 -->
  <div class="section">
    <div class="section-label">活動記録</div>
    <div style="margin-bottom:14px;">
      <label class="field-label">運動時間</label>
      <input type="number" id="f-exercise-time" placeholder="分" style="max-width:110px;">
    </div>
    <div style="margin-bottom:14px;">
      <label class="field-label">運動内容</label>
      <input type="text" id="f-exercise-content" placeholder="ランニング、筋トレ など">
    </div>
    <div style="margin-bottom:14px;">
      <label class="field-label">腹筋ローラー</label>
      <div style="display:flex; gap:8px; align-items:center;">
        <input type="number" id="f-ab-reps" placeholder="0" style="width:80px; text-align:center;">
        <span style="font-size:13px; color:var(--ink-muted); flex-shrink:0;">回</span>
        <input type="number" id="f-ab-sets" placeholder="0" style="width:80px; text-align:center;">
        <span style="font-size:13px; color:var(--ink-muted); flex-shrink:0;">セット</span>
      </div>
    </div>
    <div>
      <label class="field-label">学習時間</label>
      <input type="number" id="f-study-time" placeholder="分" style="max-width:110px;">
    </div>
  </div>

  <!-- メモ -->
  <div class="section">
    <div class="section-label">今日のひとこと</div>
    <textarea id="f-memo" rows="3" placeholder="今日感じたこと、出来事など…"></textarea>
  </div>

  <!-- まとめボタン -->
  <button class="btn-primary" onclick="showSummary()">まとめる</button>

  <!-- サマリー -->
  <div id="summary-area"></div>

</main>

<script>
let state = { alcoholLevel: 0, alcoholType: "" };

const alcLabels = ["なし", "少し（1〜2杯）", "普通（3〜4杯）", "多め（5〜6杯）", "たくさん"];

window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("headerDate").textContent =
    new Date().toLocaleDateString("ja-JP", { year:"numeric", month:"long", day:"numeric", weekday:"short" });
  selectAlc(0);
});

function selectAlc(level) {
  state.alcoholLevel = level;
  document.querySelectorAll(".alc-btn").forEach(b => {
    b.className = "alc-btn" + (parseInt(b.dataset.level) === level ? " sel-" + level : "");
  });
  const row = document.getElementById("alcTypeRow");
  if (level === 0) {
    row.style.display = "none";
    state.alcoholType = "";
    document.getElementById("type-solo").classList.remove("selected");
    document.getElementById("type-party").classList.remove("selected");
  } else {
    row.style.display = "grid";
  }
}

function selectType(t) {
  state.alcoholType = state.alcoholType === t ? "" : t;
  document.getElementById("type-solo").classList.toggle("selected", state.alcoholType === "一人飲み");
  document.getElementById("type-party").classList.toggle("selected", state.alcoholType === "飲み会");
}

function showSummary() {
  const exerciseTime    = document.getElementById("f-exercise-time").value;
  const exerciseContent = document.getElementById("f-exercise-content").value;
  const abReps          = document.getElementById("f-ab-reps").value;
  const abSets          = document.getElementById("f-ab-sets").value;
  const studyTime       = document.getElementById("f-study-time").value;
  const memo            = document.getElementById("f-memo").value;

  const streakAlc      = document.getElementById("f-streak-alc").value;
  const streakRamen    = document.getElementById("f-streak-ramen").value;
  const streakSelfcare = document.getElementById("f-streak-selfcare").value;

  const abVal = (abReps && abSets) ? abReps + "回×" + abSets + "セット" : (abReps ? abReps + "回" : "");

  const rows = [
    { key: "飲酒",       val: alcLabels[state.alcoholLevel] + (state.alcoholType ? "　" + state.alcoholType : "") },
    { key: "減酒",       val: streakAlc ? streakAlc + "日目" : "未入力" },
    { key: "控ラーメン", val: streakRamen ? streakRamen + "日目" : "未入力" },
    { key: "セルフケア", val: streakSelfcare ? streakSelfcare + "日目" : "未入力" },
    { key: "運動",       val: exerciseTime ? exerciseTime + "分" : "なし" },
    { key: "運動内容",   val: exerciseContent || "" },
    { key: "腹筋ローラー", val: abVal },
    { key: "学習",       val: studyTime ? studyTime + "分" : "なし" },
    { key: "メモ",       val: memo || "" },
  ];

  const plainText = rows.map(r => r.key + "：" + r.val).join("\n");
  window._summaryText = plainText;

  const rowsHtml = rows.map(r =>
    '<div class="summary-row">' +
      '<span class="summary-key">' + r.key + '</span>' +
      '<span class="summary-val">' + r.val + '</span>' +
    '</div>'
  ).join("");

  document.getElementById("summary-area").innerHTML =
    '<div class="summary-box">' +
      '<div class="summary-header">' +
        '<span class="summary-title">今日の記録まとめ</span>' +
        '<button class="copy-btn" id="copyBtn" onclick="copySummary()">コピー</button>' +
      '</div>' +
      '<div class="summary-text">' + rowsHtml + '</div>' +
    '</div>';

  document.getElementById("summary-area").scrollIntoView({ behavior: "smooth", block: "start" });
}

function copySummary() {
  navigator.clipboard.writeText(window._summaryText || "").then(() => {
    const btn = document.getElementById("copyBtn");
    btn.textContent = "コピーしました";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "コピー"; btn.classList.remove("copied"); }, 2000);
  }).catch(() => alert("コピーできませんでした"));
}
</script>
</body>
</html>
